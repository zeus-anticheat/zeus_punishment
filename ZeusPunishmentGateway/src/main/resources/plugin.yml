name: ZeusPunishmentGateway
version: 1.0-SNAPSHOT
main: org.vennv.zeuspunishment.gateway.ZeusPunishmentPlugin
api-version: 1.13
description: Automated Punishment Handling for Zeus Platform (Paper/Spigot/Folia)
commands:
  zpunish:
    description: Zeus Punishment status, lifecycle, and banwave controls
    permission: zpunish.admin
    usage: /<command> [status|reload|reconnect|gui|banwave list|banwave details <key>|banwave execute all|banwave cancel <key>|banwave clear|banwave pause|banwave resume]
